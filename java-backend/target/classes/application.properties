# Python FastAPI backend URL (update for production deployment)
python.api.base-url=http://localhost:8000

# Java backend port (Flutter connects here)
server.port=8080

# Max upload size for mushroom images (10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebClient timeout (Python AI pipeline can be slow)
webclient.timeout.seconds=60

# CORS — allow all origins in dev; lock down in production
cors.allowed-origins=*
